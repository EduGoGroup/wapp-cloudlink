version: v2
# Sin managed mode: el go_package (incl. el sufijo ";cloudlinkv1") se declara
# explícitamente en el .proto. Forma única y coherente de fijar import path +
# nombre de paquete Go del código generado.
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative
