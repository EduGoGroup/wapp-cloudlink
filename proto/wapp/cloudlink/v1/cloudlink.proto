syntax = "proto3";

package wapp.cloudlink.v1;

option go_package = "github.com/EduGoGroup/wapp-cloudlink/gen/wapp/cloudlink/v1;cloudlinkv1";

// Enrollment: enrolamiento por código de un solo uso. Unario, sobre TLS de
// servidor (el Edge aún no tiene cert). El Edge envía su CSR y recibe el
// certificado de Edge/tenant con el que después abrirá el stream con mTLS.
service Enrollment {
  rpc EnrollEdge(EnrollEdgeRequest) returns (EnrollEdgeResponse);
}

message EnrollEdgeRequest {
  string activation_code = 1;
  bytes csr_pem = 2;
}

message EnrollEdgeResponse {
  bytes edge_cert_pem = 1;
  bytes ca_chain_pem = 2;
  string tenant_id = 3;
  bytes cloud_enc_pubkey = 4; // pública X25519 (32B) de cifrado de la nube, para que el Edge selle los campos sensibles
}

// CloudLink: único canal Edge<->cloud. Stream bidireccional persistente con
// mTLS. La nube empuja comandos (CloudToEdge) y el Edge emite eventos/estados
// (EdgeToCloud). Multiplexado por session_id; correlación por command_id.
service CloudLink {
  rpc Connect(stream EdgeToCloud) returns (stream CloudToEdge);
}

// Comandos cloud -> edge.
message CloudToEdge {
  string command_id = 1;
  string session_id = 2;
  oneof payload {
    SendText send_text = 10;
    SendMedia send_media = 11;
    RunFlowStep run_flow_step = 12;
    LeaseUpdate lease_update = 13;
    Ping ping = 14;
  }
}

// Eventos/estados edge -> cloud.
message EdgeToCloud {
  string command_id = 1;
  string session_id = 2;
  oneof payload {
    IncomingMessage incoming = 10;
    DeliveryStatus delivery = 11;
    Ack ack = 12;
    Heartbeat heartbeat = 13;
    Pong pong = 14;
    MessageReceipt receipt = 15;
  }
}

message SendText {
  string to = 1;
  string text = 2;
}

message SendMedia {
  string to = 1;
  string caption = 2;
  string mime = 3;
  string filename = 4; // nombre del archivo (DocumentMessage.FileName/Title)
  MediaKind kind = 5; // elige rama DocumentMessage vs ImageMessage (el mime no basta)
  oneof src {
    bytes inline = 10;
    string presigned_url = 11;
  }
}

// Discriminador del tipo de media a enviar: define qué rama de whatsmeow usa el
// Edge (DocumentMessage vs ImageMessage), ya que el mime por sí solo no basta.
enum MediaKind {
  MEDIA_KIND_UNSPECIFIED = 0;
  MEDIA_KIND_DOCUMENT = 1; // documento (PDF, etc.)
  MEDIA_KIND_IMAGE = 2; // imagen
}

message RunFlowStep {
  bytes payload = 1;
}

message LeaseUpdate {
  bytes lease = 1;
  int64 expires_unix = 2;
  bool revoked = 3;
}

message Ping {
  int64 nonce = 1;
}

message IncomingMessage {
  string from = 1;
  string text = 2;
  int64 ts_unix = 3;
  string wa_message_id = 4;
  bool is_group = 5;
  string push_name = 6; // nombre visible del remitente (dato de negocio)
  string from_pn = 7; // número real (E.164 sin '+') si se conoce
  string from_lid = 8; // LID si se conoce
  string addressing_mode = 9; // "pn" | "lid" (diagnóstico)
  bytes enc_payload = 10; // sellado X25519 (SealFor) de un SensitivePayload marshalado, cuando está presente; si va, los planos sensibles (text/push_name/from_pn/from_lid) viajan vacíos
}

// Sub-payload de los campos sensibles de IncomingMessage. El Edge lo marshala y
// lo sella (SealFor) hacia enc_payload; la nube lo abre y lo desmarshala.
message SensitivePayload {
  string text = 1;
  string push_name = 2;
  string from_pn = 3;
  string from_lid = 4;
}

message DeliveryStatus {
  string wa_message_id = 1;
  string status = 2;
}

// Acuse de estado de un saliente (delivered/read). Aditivo (Plan 013): sube por
// el stream EdgeToCloud correlacionado con el command_id del SendText original.
// Higiene zero-knowledge: SOLO IDs/estado/timestamp/session/command_id; NUNCA
// texto, número de teléfono, JID ni contenido.
message MessageReceipt {
  string session_id = 1; // sesión del Edge (multiplexado)
  repeated string message_ids = 2; // los MessageIDs acusados (metadato, no PII)
  ReceiptStatus status = 3; // DELIVERED | READ
  int64 timestamp = 4; // epoch del receipt (types.Receipt.Timestamp)
  string command_id = 5; // correlación con el SendText original (opaco, no PII)
}

// Estado de acuse de un mensaje saliente.
enum ReceiptStatus {
  RECEIPT_STATUS_UNSPECIFIED = 0;
  RECEIPT_STATUS_DELIVERED = 1; // ✓✓ entregado
  RECEIPT_STATUS_READ = 2; // ✓✓ azul leído
}

message Ack {
  string acked_command_id = 1;
  bool ok = 2;
  string error = 3;
}

// Heartbeat: frame de estado/liveness edge->cloud. Ancla la sesión en el Cloud
// (el primer Heartbeat con identidad mTLS dispara MarkOnline) y renueva el lease
// por su lease_counter. Se emite periódicamente por cada sesión registrada.
message Heartbeat {
  int64 lease_counter = 1;
  // T2 (Plan 020, anti-self-loop): número propio E.164 (sin '+') del device de
  // esta sesión. El Cloud lo usa para reconocer cuando el remitente de un
  // entrante es un número propio del mismo tenant y así cortar el bucle. Viaja
  // en el Heartbeat porque es el mismo frame que dispara MarkOnline. Opcional:
  // vacío en Edges antiguos (compat).
  string self_pn = 2;
  // T2 (opcional, diagnóstico): JID crudo del device propio (p.ej.
  // "12025550100:12@s.whatsapp.net"). El Cloud compara por self_pn; self_jid es
  // solo trazabilidad. Puede ir vacío.
  string self_jid = 3;
  // T3 (Plan 020, estatus/zombie): estado reportado de la sesión. Por defecto
  // SESSION_STATE_UNSPECIFIED (heartbeat normal). SESSION_STATE_LOGGED_OUT marca
  // que WhatsApp cerró el dispositivo (LoggedOut): el Cloud debe marcar la sesión
  // como zombie/loggedout, distinta de un offline por caída de red.
  SessionState state = 4;
}

// Estado de sesión reportado por el Edge en el Heartbeat (Plan 020, T3). Aditivo
// y no-breaking: valores nuevos se agregan SIEMPRE al final.
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0; // sin novedad: heartbeat de liveness normal (default/compat)
  SESSION_STATE_LOGGED_OUT = 1; // WhatsApp cerró el device (events.LoggedOut) => zombie
}

message Pong {
  int64 nonce = 1;
}
