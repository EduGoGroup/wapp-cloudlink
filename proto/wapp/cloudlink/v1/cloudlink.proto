syntax = "proto3";

package wapp.cloudlink.v1;

option go_package = "github.com/EduGoGroup/wapp-cloudlink/gen/wapp/cloudlink/v1;cloudlinkv1";

// Enrollment: enrolamiento por código de un solo uso. Unario, sobre TLS de
// servidor (el Edge aún no tiene cert). El Edge envía su CSR y recibe el
// certificado de Edge/tenant con el que después abrirá el stream con mTLS.
service Enrollment {
  rpc EnrollEdge(EnrollEdgeRequest) returns (EnrollEdgeResponse);
}

message EnrollEdgeRequest {
  string activation_code = 1;
  bytes csr_pem = 2;
}

message EnrollEdgeResponse {
  bytes edge_cert_pem = 1;
  bytes ca_chain_pem = 2;
  string tenant_id = 3;
  bytes cloud_enc_pubkey = 4; // pública X25519 (32B) de cifrado de la nube, para que el Edge selle los campos sensibles
}

// CloudLink: único canal Edge<->cloud. Stream bidireccional persistente con
// mTLS. La nube empuja comandos (CloudToEdge) y el Edge emite eventos/estados
// (EdgeToCloud). Multiplexado por session_id; correlación por command_id.
service CloudLink {
  rpc Connect(stream EdgeToCloud) returns (stream CloudToEdge);
}

// Comandos cloud -> edge.
message CloudToEdge {
  string command_id = 1;
  string session_id = 2;
  oneof payload {
    SendText send_text = 10;
    SendMedia send_media = 11;
    RunFlowStep run_flow_step = 12;
    LeaseUpdate lease_update = 13;
    Ping ping = 14;
    ConfigUpdate config_update = 15;
    DiagnosticsRequest diagnostics_request = 16;
  }
}

// Eventos/estados edge -> cloud.
message EdgeToCloud {
  string command_id = 1;
  string session_id = 2;
  oneof payload {
    IncomingMessage incoming = 10;
    DeliveryStatus delivery = 11;
    Ack ack = 12;
    Heartbeat heartbeat = 13;
    Pong pong = 14;
    MessageReceipt receipt = 15;
    DiagnosticsBundle diagnostics_bundle = 16;
  }
}

message SendText {
  string to = 1;
  string text = 2;
}

message SendMedia {
  string to = 1;
  string caption = 2;
  string mime = 3;
  string filename = 4; // nombre del archivo (DocumentMessage.FileName/Title)
  MediaKind kind = 5; // elige rama DocumentMessage vs ImageMessage (el mime no basta)
  oneof src {
    bytes inline = 10;
    string presigned_url = 11;
  }
}

// Discriminador del tipo de media a enviar: define qué rama de whatsmeow usa el
// Edge (DocumentMessage vs ImageMessage), ya que el mime por sí solo no basta.
enum MediaKind {
  MEDIA_KIND_UNSPECIFIED = 0;
  MEDIA_KIND_DOCUMENT = 1; // documento (PDF, etc.)
  MEDIA_KIND_IMAGE = 2; // imagen
}

message RunFlowStep {
  bytes payload = 1;
}

message LeaseUpdate {
  bytes lease = 1;
  int64 expires_unix = 2;
  bool revoked = 3;
}

message Ping {
  int64 nonce = 1;
}

message IncomingMessage {
  string from = 1;
  string text = 2;
  int64 ts_unix = 3;
  string wa_message_id = 4;
  bool is_group = 5;
  string push_name = 6; // nombre visible del remitente (dato de negocio)
  string from_pn = 7; // número real (E.164 sin '+') si se conoce
  string from_lid = 8; // LID si se conoce
  string addressing_mode = 9; // "pn" | "lid" (diagnóstico)
  bytes enc_payload = 10; // sellado X25519 (SealFor) de un SensitivePayload marshalado, cuando está presente; si va, los planos sensibles (text/push_name/from_pn/from_lid) viajan vacíos
  // Espejo EN CLARO de la clasificación de intención del Edge (Plan 029/ADR-0020).
  // SOLO para despliegues SIN sealed transit: cuando enc_payload va presente, la
  // intención viaja sellada dentro de SensitivePayload.intent y este campo va
  // vacío. Mismo criterio que text/push_name hoy (plano solo si no hay sobre).
  ClassifiedIntent intent = 11;
}

// Sub-payload de los campos sensibles de IncomingMessage. El Edge lo marshala y
// lo sella (SealFor) hacia enc_payload; la nube lo abre y lo desmarshala.
message SensitivePayload {
  string text = 1;
  string push_name = 2;
  string from_pn = 3;
  string from_lid = 4;
  // Clasificación local del Edge (Plan 029/ADR-0020) por el camino normal
  // (sellado): sus params contienen texto literal del cliente, por eso viaja
  // aquí dentro del sobre X25519 y no en claro. La nube decide la precedencia.
  ClassifiedIntent intent = 5;
}

// Clasificación local de intención hecha por el Edge (Plan 029/ADR-0020). El
// Cloud decide la precedencia (no confía ciegamente en el Edge). params contiene
// texto literal del cliente ⇒ este mensaje viaja PREFERENTEMENTE sellado (dentro
// de SensitivePayload); el espejo en claro de IncomingMessage.intent solo se usa
// en despliegues sin sealed transit.
message ClassifiedIntent {
  string intent = 1; // etiqueta de intención resuelta (p.ej. "pedido", "saludo")
  map<string, string> params = 2; // parámetros extraídos (pueden contener texto literal del cliente)
  float confidence = 3; // confianza [0,1] reportada por el clasificador local
  string config_version = 4; // versión del catálogo de intenciones usado (trazabilidad)
}

message DeliveryStatus {
  string wa_message_id = 1;
  string status = 2;
}

// Acuse de estado de un saliente (delivered/read). Aditivo (Plan 013): sube por
// el stream EdgeToCloud correlacionado con el command_id del SendText original.
// Higiene zero-knowledge: SOLO IDs/estado/timestamp/session/command_id; NUNCA
// texto, número de teléfono, JID ni contenido.
message MessageReceipt {
  string session_id = 1; // sesión del Edge (multiplexado)
  repeated string message_ids = 2; // los MessageIDs acusados (metadato, no PII)
  ReceiptStatus status = 3; // DELIVERED | READ
  int64 timestamp = 4; // epoch del receipt (types.Receipt.Timestamp)
  string command_id = 5; // correlación con el SendText original (opaco, no PII)
}

// Estado de acuse de un mensaje saliente.
enum ReceiptStatus {
  RECEIPT_STATUS_UNSPECIFIED = 0;
  RECEIPT_STATUS_DELIVERED = 1; // ✓✓ entregado
  RECEIPT_STATUS_READ = 2; // ✓✓ azul leído
}

message Ack {
  string acked_command_id = 1;
  bool ok = 2;
  string error = 3;
}

// Heartbeat: frame de estado/liveness edge->cloud. Ancla la sesión en el Cloud
// (el primer Heartbeat con identidad mTLS dispara MarkOnline) y renueva el lease
// por su lease_counter. Se emite periódicamente por cada sesión registrada.
message Heartbeat {
  int64 lease_counter = 1;
  // T2 (Plan 020, anti-self-loop): número propio E.164 (sin '+') del device de
  // esta sesión. El Cloud lo usa para reconocer cuando el remitente de un
  // entrante es un número propio del mismo tenant y así cortar el bucle. Viaja
  // en el Heartbeat porque es el mismo frame que dispara MarkOnline. Opcional:
  // vacío en Edges antiguos (compat).
  string self_pn = 2;
  // T2 (opcional, diagnóstico): JID crudo del device propio (p.ej.
  // "12025550100:12@s.whatsapp.net"). El Cloud compara por self_pn; self_jid es
  // solo trazabilidad. Puede ir vacío.
  string self_jid = 3;
  // T3 (Plan 020, estatus/zombie): estado reportado de la sesión. Por defecto
  // SESSION_STATE_UNSPECIFIED (heartbeat normal). SESSION_STATE_LOGGED_OUT marca
  // que WhatsApp cerró el dispositivo (LoggedOut): el Cloud debe marcar la sesión
  // como zombie/loggedout, distinta de un offline por caída de red.
  SessionState state = 4;
  // T1 (Plan 031, telemetría de salud): snapshot operativo de la sesión adjunto
  // al mismo frame que dispara MarkOnline. OPCIONAL: los Edges antiguos no lo
  // envían y el Cloud debe tratar su ausencia como "sin datos de salud" (no como
  // salud mala). Separa el registro CloudLink (link_state) de la salud real del
  // socket de WhatsApp. Frontera zero-knowledge (ADR-0007): SOLO metadatos
  // operativos; JAMÁS llaves, DEK, credenciales ni contenido de mensajes.
  SessionHealth session_health = 5;
}

// SessionHealth: snapshot operativo de una sesión del Edge (Plan 031, ADR-0023).
// Todos sus campos son opcionales semánticamente: un colector que no pueda medir
// alguno lo deja en su cero. Viaja adjunto al Heartbeat. Frontera zero-knowledge
// (ADR-0007): SOLO metadatos de salud operativa. Aquí NUNCA van llaves privadas,
// la DEK, credenciales, JIDs/números ni contenido de mensajes; solo señales para
// operar la flota (~1000 Edges sin SSH).
message SessionHealth {
  // Estado real del socket de WhatsApp (whatsmeow), con prueba de vida: no "el
  // cliente existe" sino conectividad efectiva. Ver enum abajo.
  WhatsappSocketState whatsapp_socket_state = 1;
  // Motivo legible por máquina de una degradación (p. ej. "dek_load_timeout",
  // "dial_timeout"). Vacío si no hay degradación. Es un código operativo, no PII.
  string degraded_reason = 2;
  // Edad en segundos del último evento entrante procesado (prueba de vida del
  // socket receptor). 0 si aún no se ha recibido ninguno.
  int64 last_inbound_event_age_s = 3;
  // Duración en milisegundos de la última carga de la DEK (T6: detecta Keychain
  // lento). Es una métrica de tiempo; NO expone la DEK ni su material.
  int64 dek_load_duration_ms = 4;
  // Estado del circuito del clasificador de intenciones local (Plan 029): uno de
  // "closed" | "open" | "half_open". Vacío si la pieza 06 (intents) no está
  // activa en este Edge. String por ser opcional y desacoplado del 029.
  string intent_circuit = 5;
  // Profundidad actual del outbox SQLite (ADR-0003): mensajes salientes pendientes
  // de drenar. Señal de saturación/desconexión.
  int64 outbox_depth = 6;
  // Versión del binario del Edge inyectada en build (trazabilidad de flota y base
  // del auto-update del Plan 032). No es PII.
  string binary_version = 7;
  // Tiempo en segundos que lleva vivo el daemon del Edge (uptime del proceso).
  int64 daemon_uptime_s = 8;
}

// WhatsappSocketState: estado del socket de WhatsApp reportado por el Edge con
// prueba de vida (Plan 031). Aditivo/no-breaking: valores nuevos SIEMPRE al
// final. UNSPECIFIED = el Edge no reporta salud del socket (compat).
enum WhatsappSocketState {
  WHATSAPP_SOCKET_STATE_UNSPECIFIED = 0; // sin dato de salud (Edge antiguo / no medido)
  WHATSAPP_SOCKET_STATE_CONNECTED = 1;   // socket vivo y conectado (IsConnected + prueba de vida)
  WHATSAPP_SOCKET_STATE_CONNECTING = 2;  // conectando/reconectando (backoff en curso)
  WHATSAPP_SOCKET_STATE_DEGRADED = 3;    // vivo pero degradado (ver degraded_reason)
  WHATSAPP_SOCKET_STATE_DEAD = 4;        // socket caído/inoperante
}

// Estado de sesión reportado por el Edge en el Heartbeat (Plan 020, T3). Aditivo
// y no-breaking: valores nuevos se agregan SIEMPRE al final.
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0; // sin novedad: heartbeat de liveness normal (default/compat)
  SESSION_STATE_LOGGED_OUT = 1; // WhatsApp cerró el device (events.LoggedOut) => zombie
}

message Pong {
  int64 nonce = 1;
}

// Push genérico de configuración Cloud->Edge (ADR-0021). Frame extensible: kind
// discrimina el tipo de configuración empujada y payload lleva el contenido
// serializado propio de ese kind (versionado por version). Primer kind:
// "intents" (catálogo de intenciones del clasificador local del Plan 029). El
// Edge que no reconozca un kind debe ignorarlo sin error (compat aditiva).
message ConfigUpdate {
  string command_id = 1; // correlación con el Ack del Edge
  string session_id = 2; // sesión destino (multiplexado); vacío = a todas las del Edge
  string kind = 3; // tipo de configuración (p.ej. "intents")
  string version = 4; // versión del contenido, para idempotencia/trazabilidad
  bytes payload = 5; // contenido serializado propio del kind
}

// DiagnosticsRequest: la nube pide bajo demanda un paquete de diagnóstico a un
// Edge (Plan 031, ADR-0023). Diagnóstico remoto de una flota sin SSH. El Edge
// responde con un DiagnosticsBundle correlacionado por command_id (patrón
// ConfigUpdate: Ack + idempotencia por command_id). Solo metadatos operativos.
message DiagnosticsRequest {
  string command_id = 1; // correlación con el Ack y con el DiagnosticsBundle de respuesta
  string session_id = 2;  // sesión objetivo (multiplexado); vacío = alcance del Edge completo
  // Alcance del diagnóstico pedido (p. ej. "full", "logs", "goroutines",
  // "subsystems"). String por extensibilidad; el Edge ignora un scope que no
  // reconozca y devuelve lo que sepa (compat aditiva).
  string scope = 3;
}

// DiagnosticsBundle: respuesta del Edge a un DiagnosticsRequest (Plan 031). Sube
// por EdgeToCloud correlacionado por command_id. Frontera zero-knowledge dura
// (ADR-0007): SOLO material operativo de diagnóstico; el Edge DEBE sanear antes
// de enviar — JAMÁS llaves, DEK, credenciales, tokens ni contenido de mensajes,
// ni en logs ni en dumps (el Plan 031 T8 añade un gate que escanea el bundle).
//
// Tope de tamaño: el transporte ya impone un máximo de 4 MiB por frame gRPC. El
// bundle DEBE caber en ese límite; el Edge trunca en origen (ring buffer de N
// líneas de log, dump acotado) antes de enviar. Si un futuro diagnóstico no
// cupiera, se trocearía por command_id — hoy no hace falta.
message DiagnosticsBundle {
  string command_id = 1;     // correlación con el DiagnosticsRequest que lo originó
  string log_tail = 2;       // últimas N líneas del ring buffer de logs (ya saneadas, truncadas en origen)
  string goroutine_dump = 3; // volcado de goroutines (runtime.Stack(all=true)), truncado en origen
  string subsystems_json = 4; // snapshot JSON de subsistemas (intent/status y pares); metadatos operativos, no PII
}
